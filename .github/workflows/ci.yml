name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  go:
    name: build + vet
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache-dependency-path: go.sum
      - name: gofmt
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            echo "::error::gofmt needed on:"; echo "$unformatted"; exit 1
          fi
      - run: go build ./...
      - run: go vet ./...

  compose:
    name: compose config
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: validate merged compose
        run: |
          docker compose \
            -f compose/base.yml -f compose/shared.yml \
            -f compose/metrics.yml -f compose/logs.yml -f compose/traces.yml \
            --profile metrics --profile logs --profile traces \
            config --quiet
