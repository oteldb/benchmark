# metrics.yml — PromQL lane. dedicated metric stores + the fan-out collector.
# Profile: metrics.   docker compose ... --profile metrics
volumes:
  prometheus-data:
  victoriametrics-data:
  mimir-data:
  greptimedb-data:

# Metrics generation + fan-out. node-exporter produces real metrics; vmagent
# scrapes it as 10 synthetic hosts (config/vmagent/scrape.yml) and remote-writes
# the live, current-timestamp, in-order, snappy stream to every engine — so each
# ingests identical data with no static-dataset timestamp problems. `benchctl
# ingest metrics` is just a prewarm wait while this runs.
services:
  node-exporter:
    image: prom/node-exporter:v1.8.2
    profiles: [metrics]
    networks: [bench]
    command: ["--web.max-requests=40"]

  vmagent:
    image: victoriametrics/vmagent:v1.106.1
    profiles: [metrics]
    networks: [bench]
    volumes:
      - ../config/vmagent/scrape.yml:/etc/vmagent/scrape.yml:ro
    command:
      - -promscrape.config=/etc/vmagent/scrape.yml
      - -remoteWrite.url=http://oteldb:19291/api/v1/write
      - -remoteWrite.url=http://oteldb-ch:19291/api/v1/write
      - -remoteWrite.url=http://oteldb-s3:19291/api/v1/write
      - -remoteWrite.url=http://prometheus:9090/api/v1/write
      - -remoteWrite.url=http://victoriametrics:8428/api/v1/write
      - -remoteWrite.url=http://mimir:9009/api/v1/push
      - -remoteWrite.url=http://greptimedb:4000/v1/prometheus/write
      - -remoteWrite.url=http://gigapipe:3100/api/v1/prom/remote/write
    ports: ["127.0.0.1:8429:8429"]

  prometheus:
    image: prom/prometheus:v3.4.1
    profiles: [metrics]
    networks: [bench]
    user: root                  # named volume /data is root-owned; TSDB needs write
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --web.enable-remote-write-receiver
      - --storage.tsdb.path=/data
    volumes:
      - ../config/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/data
    ports: ["127.0.0.1:9091:9090"]

  victoriametrics:
    image: victoriametrics/victoria-metrics:v1.106.1
    profiles: [metrics]
    networks: [bench]
    command:
      - --storageDataPath=/data
      - --retentionPeriod=100y
    volumes:
      - victoriametrics-data:/data
    ports: ["127.0.0.1:8428:8428"]

  # Mimir monolithic, object storage on the shared go-faster/fs S3 (bucket: mimir).
  mimir:
    image: grafana/mimir:3.1.2
    profiles: [metrics]
    networks: [bench]
    depends_on:
      fs-init: { condition: service_completed_successfully }
    command:
      - -config.file=/etc/mimir/mimir.yml
      - -target=all
      - -auth.multitenancy-enabled=false
    volumes:
      - ../config/mimir/mimir.yml:/etc/mimir/mimir.yml:ro
      - mimir-data:/data
    ports: ["127.0.0.1:9009:9009"]

  # GreptimeDB standalone, object storage on go-faster/fs S3 (bucket: greptimedb).
  # In [logs]/[traces] too: it ingests the OTLP log/trace streams into otel_logs /
  # opentelemetry_traces and is queried over SQL (systems.yml, queries/native/greptimedb.yml).
  greptimedb:
    image: greptime/greptimedb:v1.1.1
    profiles: [metrics, logs, traces]
    networks: [bench]
    depends_on:
      fs-init: { condition: service_completed_successfully }
    command:
      - standalone
      - start
      - --config-file=/etc/greptimedb/config.toml
    volumes:
      - ../config/greptimedb/config.toml:/etc/greptimedb/config.toml:ro
      - greptimedb-data:/data
    ports: ["127.0.0.1:4000:4000"]
