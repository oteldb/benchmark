# VictoriaLogs native LogsQL equivalents of logs.logql.yml (matched by id).
# apples=false: same dataset/ingest, not LogQL semantics. Queried via
# GET /select/logsql/query. Field names follow VictoriaLogs' OTLP mapping
# (service.name -> service.name, severity -> level via the log record).
system: victorialogs
api: logsql
queries:
  - id: select_service
    q: 'service.name:="unknown_service"'
  - id: level_error
    q: 'level:=ERROR'
  - id: level_warn
    q: 'level:=WARN'
  - id: error_token
    q: 'level:=ERROR AND "method"'
  - id: body_get
    q: '"GET"'
  - id: status_regex
    q: '_msg:~"\"status\":4[0-9][0-9]"'
  - id: json_status
    q: '_msg:~"\"status\":4[0-9][0-9]"'
  - id: lines_by_level
    q: '* | stats by (level) count() lines'
  - id: rate_by_level
    q: '* | stats by (level) count() lines'
  - id: error_rate
    q: 'level:=ERROR | stats count() lines'
