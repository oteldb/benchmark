# LogQL suite. Run against every logs system's Loki HTTP API.
# Dataset: otelbench synthetic logs (service_name="unknown_service", level in
# DEBUG/INFO/WARN/ERROR/FATAL/TRACE, JSON bodies with method/status/client_ip).
# Set LOGHUB_DIR before ingest to replay real loghub data instead, then point this
# file at the loghub selectors (service_name=ssh|apache|linux|...).
kind: logs
range:
  lookback: 300
  step: 30
queries:
  - id: select_service
    title: "Selector: all service lines"
    type: range
    q: '{service_name="unknown_service"}'
  - id: level_error
    title: "Selector: ERROR level"
    type: range
    q: '{level="ERROR"}'
  - id: level_warn
    title: "Selector: WARN level"
    type: range
    q: '{level="WARN"}'
  - id: error_token
    title: "Filter: ERROR + token"
    type: range
    q: '{level="ERROR"} |= "method"'
  - id: body_get
    title: "Filter: body token GET"
    type: range
    q: '{service_name="unknown_service"} |= "GET"'
  - id: status_regex
    title: "Filter: 4xx status regex"
    type: range
    q: '{service_name="unknown_service"} |~ "\"status\":4[0-9][0-9]"'
  - id: json_status
    title: "Parse: json status>=400"
    type: range
    q: '{service_name="unknown_service"} | json | status>=400'
  - id: lines_by_level
    title: "Metric: lines by level"
    type: range
    q: 'sum by (level) (count_over_time({service_name="unknown_service"}[1m]))'
  - id: rate_by_level
    title: "Metric: rate by level"
    type: range
    q: 'sum by (level) (rate({service_name="unknown_service"}[1m]))'
  - id: error_rate
    title: "Metric: error rate"
    type: range
    q: 'sum(rate({level="ERROR"}[1m]))'
