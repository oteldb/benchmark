# node_exporter "multiplication": the same node-exporter endpoint is scraped as
# 10 synthetic hosts (host-0..host-9), each a distinct target by its instance
# label. vmagent thus generates ~10x node_exporter cardinality with current
# timestamps, in order, and remote-writes it (standard snappy) to every engine —
# so the PromQL suite's {instance="host-0",job="node_exporter"} selectors resolve
# against live data. Tune density via global.scrape_interval and the host count.
global:
  scrape_interval: 2s
scrape_configs:
  - job_name: node_exporter
    static_configs:
      - { targets: ['node-exporter:9100'], labels: { instance: 'host-0' } }
      - { targets: ['node-exporter:9100'], labels: { instance: 'host-1' } }
      - { targets: ['node-exporter:9100'], labels: { instance: 'host-2' } }
      - { targets: ['node-exporter:9100'], labels: { instance: 'host-3' } }
      - { targets: ['node-exporter:9100'], labels: { instance: 'host-4' } }
      - { targets: ['node-exporter:9100'], labels: { instance: 'host-5' } }
      - { targets: ['node-exporter:9100'], labels: { instance: 'host-6' } }
      - { targets: ['node-exporter:9100'], labels: { instance: 'host-7' } }
      - { targets: ['node-exporter:9100'], labels: { instance: 'host-8' } }
      - { targets: ['node-exporter:9100'], labels: { instance: 'host-9' } }
