# oteldb under test, serving all three signals from the embedded storage engine.
# Run with --embedded (see compose/shared.yml), which routes metrics/logs/traces
# to the github.com/oteldb/storage engine. The engine's `file` backend writes to
# the mounted /data volume; the same engine speaks S3 to the shared go-faster/fs
# server in production (storage/backend/s3) — see README "Storage substrate".
storage:
  backend: file
  dir: /data

prometheus:                     # PromQL HTTP API (Prometheus-compatible)
  bind: 0.0.0.0:9090
  max_samples: 1_000_000
  timeout: 1m
  enable_negative_offset: true
loki:                           # LogQL HTTP API (Loki-compatible)
  bind: 0.0.0.0:3100
tempo:                          # TraceQL HTTP API (Tempo-compatible)
  bind: 0.0.0.0:3200
health_check:
  bind: 0.0.0.0:13133

# Ingest receivers: Prometheus remote-write for metrics (replayed directly),
# OTLP for logs + traces (fanned out by config/otelcol/{logs,traces}.yml).
# Under --embedded the oteldbexporter writes to the embedded storage engine, so
# its DSN is ignored — but every pipeline must still name an exporter.
otelcol:
  receivers:
    prometheusremotewrite:
      endpoint: 0.0.0.0:19291
      time_threshold: 100000h
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318
  exporters:
    oteldbexporter:
      dsn: clickhouse://default:default@clickhouse:9000   # ignored under --embedded
  service:
    pipelines:
      metrics: { receivers: [prometheusremotewrite], exporters: [oteldbexporter] }
      logs:    { receivers: [otlp], exporters: [oteldbexporter] }
      traces:  { receivers: [otlp], exporters: [oteldbexporter] }
