# Mimir monolithic, blocks storage on the shared go-faster/fs S3 server.
# One bucket (mimir) on the same fs instance Loki/Tempo/GreptimeDB/oteldb use.
multitenancy_enabled: false

# Single-node: one instance per ring, so replication factor must be 1 (the
# default 3 makes the lone instance look like "too many unhealthy instances").
ingester:
  ring:
    replication_factor: 1
store_gateway:
  sharding_ring:
    replication_factor: 1

common:
  storage:
    backend: s3
    s3:
      endpoint: fs:9000
      bucket_name: mimir
      access_key_id: bench
      secret_access_key: benchbench
      insecure: true            # plain HTTP to fs
      # path-style addressing (endpoint/bucket/key), which go-faster/fs serves
      bucket_lookup_type: path

# One bucket (mimir), three distinct prefixes — Mimir rejects identical
# (bucket, prefix) tuples across blocks/ruler/alertmanager storage.
blocks_storage:
  storage_prefix: blocks
  tsdb:
    dir: /data/tsdb
  bucket_store:
    sync_dir: /data/tsdb-sync

compactor:
  data_dir: /data/compactor

ruler_storage:
  storage_prefix: ruler

alertmanager_storage:
  storage_prefix: alertmanager

server:
  http_listen_port: 9009
  log_level: warn

limits:
  ingestion_rate: 1000000
  ingestion_burst_size: 2000000
  max_global_series_per_user: 0
  out_of_order_time_window: 100h
