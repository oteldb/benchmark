# Tempo single-binary, trace blocks on the shared go-faster/fs S3 (bucket: tempo).
server:
  http_listen_port: 3200
  log_level: warn

distributor:
  receivers:
    otlp:
      protocols:
        grpc: { endpoint: 0.0.0.0:4317 }

ingester:
  max_block_duration: 5m

compactor:
  compaction:
    block_retention: 720h

storage:
  trace:
    backend: s3
    s3:
      endpoint: fs:9000
      bucket: tempo
      access_key: bench
      secret_key: benchbench
      insecure: true
      forcepathstyle: true
    wal:
      path: /var/tempo/wal
